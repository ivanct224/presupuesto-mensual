name: Deploy a GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

  permissions:
    contents: read
    pages: weite
    id-token: write

    concurrency:
    group: pages
    cancel-in-progress: true

jobs:
  build:
    runs.on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - uses: action/upload-pages-artifact@v3
        wiht:
          path: ./dist
deply:
  needs: build
  runs-on: ubuntu-latest
  environment:
    name: github-pages
    url: ${{ steps.deployment.outputs.page_url }}
  steps:
    - id: deployment
    uses: action/deploy-pages@v4
